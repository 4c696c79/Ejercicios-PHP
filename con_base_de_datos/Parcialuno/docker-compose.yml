services:

  web:
    build: .
    ports:
      - "8080:80"
    volumes:
      - .:/var/www/html:z
    depends_on:
      db:
        condition: service_healthy   # ← espera al healthcheck

  db:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: party
      MYSQL_USER: usuario
      MYSQL_PASSWORD: contrasenia
    volumes:
      - ./code/party.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:                          # ← esto es lo nuevo
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  phpmyadmin:
    image: phpmyadmin
    ports:
      - "8081:80"
    environment:
      PMA_HOST: db
      PMA_USER: root
      PMA_PASSWORD: root