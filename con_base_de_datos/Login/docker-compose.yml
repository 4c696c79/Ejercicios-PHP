version: "3.9"

services:
  web:
    build: .
    ports:
      - "8082:80"
    volumes:
      - .:/var/www/html:z
    depends_on:
      base_de_datos:
        condition: service_healthy

  
  base_de_datos:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: login_db
      MYSQL_USER: usuario
      MYSQL_PASSWORD: contrasena
    volumes:
      - ./login_db.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:                                          # ← verifica que MySQL responde
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s    # revisa cada 5 segundos
      timeout: 5s     # espera máximo 5 segundos
      retries: 5      # intenta 5 veces antes de rendirse
      start_period: 10s # le da 10s de gracia al arrancar

  phpmyadmin:
    image: phpmyadmin
    ports:
      - "8083:80"
    environment:
      PMA_HOST: base_de_datos
      PMA_ROOT: root
      PMA_PASSWORD: root